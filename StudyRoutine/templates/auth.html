{% extends 'base.html' %}
{% block title %}Authorization{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center min-h-[70vh]">
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center">
        <h1 class="text-3xl font-bold mb-6">Authorization</h1>
        <p class="text-gray-500 mb-6">Заглушка. Здесь будет форма входа/регистрации.</p>
        <div class="space-y-3">
            <input type="text" placeholder="Логин" class="w-full border rounded-xl px-4 py-2">
            <input type="password" placeholder="Пароль" class="w-full border rounded-xl px-4 py-2">
            <button class="bg-blue-600 text-white w-full py-2 rounded-xl hover:bg-blue-700">Войти</button>
        </div>
        <p class="mt-4 text-sm text-gray-400">
            <a href="/" class="text-blue-500">Вернуться на главную</a>
        </p>
    </div>
</div>
{% endblock %}
